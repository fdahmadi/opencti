name: Conditional Sync Fork with Upstream

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Upstream Remote
        run: |
          git remote add upstream https://github.com/raysunplus/opencti.git
          git fetch upstream

      - name: Detect changes without merging
        id: detect
        run: |
          git fetch upstream

          if [ "$(git rev-list HEAD...upstream/main --count)" -gt 0 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Call Webhook (only if changed)
        id: webhook
        if: steps.detect.outputs.changed == 'true'
        run: |
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"status":"changes_detected","repo":"${{ github.repository }}"}' \
            http://185.204.170.162:15000/webhook)

          echo "Webhook returned HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi

      - name: Merge Upstream into Main
        if: steps.detect.outputs.changed == 'true' && steps.webhook.conclusion == 'success'
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push Changes
        if: steps.detect.outputs.changed == 'true' && steps.webhook.conclusion == 'success'
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
